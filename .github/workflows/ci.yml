name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (default features)
        run: cargo build --workspace

      - name: Run tests (default features)
        run: cargo test --workspace

      - name: Run tests (wasm feature on qv-core)
        run: cargo test -p qv-core --features wasm

      - name: Clippy (default features)
        run: cargo clippy --workspace -- -W clippy::all

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Security audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  test-web-demo:
    name: Web demo — Vitest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-demo/package-lock.json

      - name: Install dependencies
        working-directory: web-demo
        run: npm ci

      - name: Run tests
        working-directory: web-demo
        run: npm run test

      - name: Type-check + build
        working-directory: web-demo
        run: npm run build
