name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (default features)
        run: cargo build --workspace

      - name: Run tests (default features)
        run: cargo test --workspace --all-features

      - name: Run tamper, corpus, nonce, zeroize, and differential tests
        run: cargo test --workspace -p qv-core --test tamper_tests --test corpus_tests --test nonce_tests --test zeroize_tests --test differential_tests

      - name: Run tests (wasm feature on qv-core)
        run: cargo test -p qv-core --features wasm

      - name: Clippy (default features)
        run: cargo clippy --workspace -- -W clippy::all

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Fuzz container parser (short smoke run)
        run: |
          rustup install nightly --no-self-update
          cargo +nightly install cargo-fuzz --locked 2>/dev/null || true
          cargo +nightly fuzz run fuzz_container_parse \
            --manifest-path crates/qv-core/fuzz/Cargo.toml \
            -- -max_total_time=30 -max_len=4096

      - name: Fuzz decrypt pipeline (short smoke run)
        run: |
          rustup install nightly --no-self-update
          cargo +nightly install cargo-fuzz --locked 2>/dev/null || true
          cargo +nightly fuzz run fuzz_decrypt_pipeline \
            --manifest-path crates/qv-core/fuzz/Cargo.toml \
            -- -max_total_time=30 -max_len=4096

      - name: Fuzz KEM handshake (short smoke run)
        run: |
          rustup install nightly --no-self-update
          cargo +nightly install cargo-fuzz --locked 2>/dev/null || true
          cargo +nightly fuzz run fuzz_kem_handshake \
            --manifest-path crates/qv-core/fuzz/Cargo.toml \
            -- -max_total_time=30 -max_len=4096

      - name: Fuzz signature verify (short smoke run)
        run: |
          rustup install nightly --no-self-update
          cargo +nightly install cargo-fuzz --locked 2>/dev/null || true
          cargo +nightly fuzz run fuzz_signature_verify \
            --manifest-path crates/qv-core/fuzz/Cargo.toml \
            -- -max_total_time=30 -max_len=4096

      - name: Fuzz WASM API boundary (short smoke run)
        run: |
          rustup install nightly --no-self-update
          cargo +nightly install cargo-fuzz --locked 2>/dev/null || true
          cargo +nightly fuzz run fuzz_wasm_api \
            --manifest-path crates/qv-core/fuzz/Cargo.toml \
            -- -max_total_time=30 -max_len=4096

      - name: Security audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - name: Cargo deny
        run: |
          cargo install cargo-deny --locked
          cargo deny check advisories bans sources

  test-web-demo:
    name: Web demo — Vitest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-demo/package-lock.json

      - name: Install dependencies
        working-directory: web-demo
        run: npm ci

      - name: Run tests
        working-directory: web-demo
        run: npm run test

      - name: Lint (ESLint)
        working-directory: web-demo
        run: npm run lint

      - name: Type-check + build
        working-directory: web-demo
        run: npm run build
