name: Deploy web demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web-demo/**'
      - '.github/workflows/deploy-pages.yml'
  # Allow triggering manually from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-flight runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Vite static bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-demo/package-lock.json

      - name: Verify WASM binary integrity
        working-directory: web-demo
        run: |
          # NOTE: This step is a *consistency check* — it verifies that the
          # committed .wasm files match the committed .wasm.sha256 hashes.
          # It does NOT prove the WASM was built from the source in this repo.
          # A full reproducibility guarantee requires rebuilding from source
          # using Emscripten (see wasm/build.sh) and comparing outputs.
          # Any change to the .wasm files must be accompanied by a matching
          # update to the .wasm.sha256 files in the same PR and reviewed.
          SMAUG_EXPECTED=$(cat public/smaug.wasm.sha256 | tr -d '[:space:]')
          HAETAE_EXPECTED=$(cat public/haetae.wasm.sha256 | tr -d '[:space:]')
          SMAUG_ACTUAL=$(sha256sum public/smaug.wasm | awk '{print $1}')
          HAETAE_ACTUAL=$(sha256sum public/haetae.wasm | awk '{print $1}')
          if [ "$SMAUG_ACTUAL" != "$SMAUG_EXPECTED" ]; then
            echo "ERROR: smaug.wasm SHA-256 mismatch"
            echo "  expected: $SMAUG_EXPECTED"
            echo "  actual:   $SMAUG_ACTUAL"
            exit 1
          fi
          if [ "$HAETAE_ACTUAL" != "$HAETAE_EXPECTED" ]; then
            echo "ERROR: haetae.wasm SHA-256 mismatch"
            echo "  expected: $HAETAE_EXPECTED"
            echo "  actual:   $HAETAE_ACTUAL"
            exit 1
          fi
          echo "WASM integrity verified."

      - name: Install dependencies
        working-directory: web-demo
        run: npm ci

      - name: Run tests
        working-directory: web-demo
        run: npm run test

      - name: Build Vite bundle
        working-directory: web-demo
        run: npm run build
        # base path '/crypto-lab-quantum-vault-kpqc/' is set permanently in vite.config.ts

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-demo/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
