name: Deploy web demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web-demo/**'
      - '.github/workflows/deploy-pages.yml'
  # Allow triggering manually from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-flight runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Vite static bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-demo/package-lock.json

      - name: Install dependencies
        working-directory: web-demo
        run: npm ci

      - name: Build Vite bundle
        working-directory: web-demo
        run: npm run build
        # base path '/quantum-vault-kpqc/' is set permanently in vite.config.ts

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-demo/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
